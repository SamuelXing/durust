[package]
name = "durust"
version = "0.1.0"
edition = "2021"
description = "A DBOS-style durable execution library for Rust: write normal async code, checkpoint every step to a database, resume exactly where you left off after a crash."
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
tracing = "0.1"
inventory = "0.3"
uuid = { version = "1", features = ["v4"] }
cron = "0.12"
durust-macros = { path = "durust-macros", version = "0.1" }
# Postgres backend. If your sqlx version complains about features, see README.
sqlx = { version = "0.7", features = ["runtime-tokio", "tls-rustls", "postgres", "sqlite", "json", "chrono", "migrate"] }

[dev-dependencies]
tracing-subscriber = "0.3"

[[example]]
name = "order"
path = "examples/order.rs"
