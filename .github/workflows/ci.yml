name: ci

# Build, lint, and test the SDK on every push to main and every PR. The test job
# runs the whole suite against all three backends in one pass — in-memory, SQLite,
# and a **live Postgres** service — so the Postgres-gated tests actually run here
# (they early-return as "skipped" only when DATABASE_URL is unset, which it never
# is in this job).

on:
  push:
    branches: [main]
  # Skip draft PRs until they are marked ready (matches the Go/Python SDK CIs).
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# Cancel superseded runs on the same ref (a new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        # --all-features so opt-in features (conductor) are linted too; the
        # no-default-features job below guards the lean floor.
        run: cargo clippy --all-targets --all-features -- -D warnings

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The declared minimum supported Rust version (Cargo.toml `rust-version`).
      # Driven by transitive deps (home, icu); this job fails if a dep bump
      # raises the floor, so the pin can't silently rot.
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (lib)
        run: cargo check --lib

  test:
    name: test (in-memory + sqlite + postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          # A deliberately gnarly password (matching the Go/Python SDK CIs) so the
          # connection path exercises URL-escaping — the DATABASE_URL below carries
          # the percent-encoded form.
          POSTGRES_PASSWORD: 'a!b@c$d()e*_,/:;=?@ff[]22'
          POSTGRES_DB: durare_test
        ports:
          - 5432:5432
        # Wait until the server accepts connections before the steps run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Drives the Postgres backend tests (schema is applied by the providers'
      # sqlx migrations on connect). Without this they skip; here they run. The
      # password is the percent-encoded form of POSTGRES_PASSWORD above.
      DATABASE_URL: postgres://postgres:a%21b%40c%24d%28%29e%2A_%2C%2F%3A%3B%3D%3F%40ff%5B%5D22@localhost:5432/durare_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test
        # --all-features so opt-in features (conductor) are exercised; the
        # no-default-features job guards that the crate still builds without them.
        run: cargo test --all-targets --all-features
      - name: doc tests
        run: cargo test --doc --all-features

  docs:
    name: doc build
    runs-on: ubuntu-latest
    env:
      # docs.rs readiness: a broken intra-doc link or bad doc comment fails CI.
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --no-deps --all-features

  features:
    name: no-default-features (conductor off)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The crate must build and lint cleanly with the conductor feature gated
      # off, so non-conductor code never leans on a conductor-only symbol or dep.
      - name: clippy --no-default-features
        run: cargo clippy --no-default-features --all-targets -- -D warnings
