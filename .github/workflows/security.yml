name: security

# Supply-chain scans of the dependency tree: cargo audit (RustSec advisories —
# the Rust analog of the Go SDK's govulncheck) and cargo deny (advisories plus
# license allow-listing and source pinning, per deny.toml). Deliberately NOT a
# PR gate: a freshly published advisory should never block unrelated work from
# landing on main. Runs on a weekly schedule, on demand, and whenever the
# dependency manifests or the policy change.

on:
  schedule:
    # Mondays 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/security.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cargo.lock is gitignored, so materialize one for the scan.
      - name: generate lockfile
        run: cargo generate-lockfile
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: audit
        run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Advisories + license allow-list + registry/source pinning (deny.toml).
      # Generates its own lockfile (Cargo.lock is gitignored).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
